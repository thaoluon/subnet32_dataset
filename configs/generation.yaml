# --- Yield vs strictness (mdok / API $) ---
# Tight word_count + overlap rules drop many otherwise fine completions. If paid API rows are
# sparse, lower word_count_min and raise ai_prefix_overlap_max first; then widen max_tokens_range.
word_count_min: 48
word_count_max: 420
min_sentences: 2
max_non_alnum_ratio: 0.30
max_line_repetition: 0.52
# Continuations often reuse topic words from the prefix; 0.88 rejected a lot of valid GPT text.
ai_prefix_overlap_max: 0.94
list_heavy_max_ratio: 0.65
# 0 = do not reject short "code-like" snippets (Pile code domains).
code_heavy_word_threshold: 0

sentence_span_min: 4
sentence_span_max: 8
prefix_sentence_min: 2
prefix_sentence_max: 4

temperature_range: [0.3, 1.2]
top_p_range: [0.7, 1.0]
# Wider cap → longer completions → easier to pass word_count_min after augment.
max_tokens_range: [96, 280]
repeat_penalty_range: [1.0, 1.2]

# Ollama num_predict (max tokens to generate)
num_predict: 512

# Neutral continuation system prompt (kept short to avoid assistant tone)
continuation_system: "You are a text completion model. Continue the user's text naturally in the same style. Output only the continuation, no preamble or labels."

# Raw completion for models with :text in name skips system message in code
use_raw_completion_for_text_models: true

# Preflight GET /api/tags before streaming Pile (fail fast if Ollama is down)
ollama_health_timeout_sec: 5

# HTTP timeout per Ollama/OpenAI generate (seconds). Large quotas: 360–600 avoids false timeouts.
request_timeout_sec: 420

# --- Hard AI (paraphrase / rewrite of model text) ---
# Random one is chosen per rewrite for diversity. If the list is empty, hard_transform_system is used.
hard_transform_systems:
  - name: paraphrase
    system: >-
      You rewrite the passage in fresh wording while preserving facts, tone, and register.
      Output only the rewritten passage — no preamble or quotes.
  - name: concise
    system: >-
      You produce a shorter, tighter version of the passage while keeping the same meaning.
      Remove redundancy. Output only the rewritten passage — no preamble.
  - name: formal
    system: >-
      You rewrite the passage in a slightly more formal, polished register suitable for an article.
      Preserve meaning. Output only the rewritten passage — no preamble.
  - name: casual
    system: >-
      You rewrite the passage in a more conversational, natural tone while staying coherent.
      Preserve meaning. Output only the rewritten passage — no preamble.
  - name: grammar_cleanup
    system: >-
      You lightly edit the passage for grammar, clarity, and flow without changing meaning or adding content.
      Output only the edited passage — no preamble.
  - name: humanize
    system: >-
      You rewrite so the passage reads like careful human editing: varied rhythm, less template-like phrasing.
      Preserve meaning. Output only the rewritten passage — no preamble.
  - name: imperfect_edit
    system: >-
      You lightly edit the passage as a rushed human might: one or two awkward word choices, a slightly
      uneven sentence, minor redundancy, but no gibberish. Keep overall meaning. Output only the edited passage — no preamble.
  - name: sentence_reorder
    system: >-
      Reorder sentences and clauses where it still reads naturally — same facts and tone, different flow.
      Do not add or remove major content. Output only the rewritten passage — no preamble.

# Fallback single string if hard_transform_systems is missing or empty
hard_transform_system: >-
  You rewrite the passage in fresh wording while preserving facts, tone, and register.
  Fix awkward phrasing if needed. Output only the rewritten passage — no preamble or quotes.
hard_transform_temperature_range: [0.22, 0.62]
hard_transform_top_p_range: [0.78, 1.0]
hard_transform_max_tokens_min: 110
hard_transform_max_tokens_max: 400

# --- Mixed sample (human span + AI continuation in one document) ---
mixed_paragraph_joiner: "\n\n"
mixed_word_count_max: 620
