# HuggingFace streaming Pile (same family as validator PromptDataset in this repo)
huggingface_dataset: "monology/pile-uncopyrighted"
split: "train"
# Larger buffer = better shuffle on multi-TB streams (uses RAM). Try 200000–500000 on 96GB+ hosts.
shuffle_buffer_size: 200000
text_field: "text"
meta_field: "meta"

# Optional: local JSONL with {"text": "...", "meta": {...}} per line (if source: local)
local_jsonl_path: null

source: "huggingface"  # huggingface | local

# Hugging Face Hub sometimes returns 502/503/504 on dataset tree/API; retry before failing.
hf_load_max_retries: 15
hf_load_retry_base_sec: 20
hf_load_retry_max_sec: 180

# Streaming can fail mid-iteration (e.g. FileNotFoundError on zstd://...hf:// shard after timeouts).
# Reconnect rebuilds the stream; consumer keeps going until num_pairs (may see duplicate pile docs).
hf_stream_max_reconnects: 30
hf_stream_reconnect_base_sec: 15
hf_stream_reconnect_max_sec: 120

# If unset, Hugging Face Hub default applies; set higher on slow links (seconds). Uses HF_HUB_DOWNLOAD_TIMEOUT.
hf_hub_download_timeout_sec: 300

# Target mix by coarse domain (0–1, renormalized if some domains missing)
domain_quotas:
  web: 0.20
  academic: 0.20
  code: 0.10
  legal: 0.10
  medical: 0.10
  financial: 0.10
  books: 0.20

# Map Pile subset names (from meta) to coarse domains; unknown → weighted random by quotas
pile_subset_to_domain:
  "Wikipedia (en)": web
  "Wikipedia (de)": web
  "OpenWebText2": web
  "OpenSubtitles": web
  "StackExchange": web
  "Ubuntu IRC": web
  "YoutubeSubtitles": web
  "DM Mathematics": academic
  "Enron Emails": web
  "EuroParl": web
  "FreeLaw": legal
  "HackerNews": web
  "NIH ExPorter": medical
  "PubMed Central": medical
  "USPTO Backgrounds": legal
  "ArXiv": academic
  "BookCorpus2": books
  "Books3": books
  "Gutenberg (PG-19)": books
  "Github": code
  "Pile-CC": web
  "PhilPapers": academic

random_seed: 42
default_coarse_domain: web

# Multi-process Pile streaming: run N workers with the same random_seed and distinct stream_shard_index
# in [0, N), stream_num_shards: N — each worker skips rows so partitions are disjoint (merge JSONL after).
stream_num_shards: 1
stream_shard_index: 0

# JSONL layout: mixed = train.jsonl contains both labels; by_label = human/train.jsonl + ai/train.jsonl
# (easier for 3M human + 3M AI pipelines). Override with CLI: --output-layout by_label
output_layout: by_label

# Quota mode: fill exact bucket counts (human / direct_ai / hard_ai / mixed). When true,
# --num-pairs is ignored for stopping (use sample_targets sums). Requires AI providers.
# Dev / “fill AI fast”: false → pair mode; each kept doc writes human + one AI continuation until
# --num-pairs matched pairs. Set true again for the ~3M mdok quota recipe below.
use_sample_quotas: false

# Quota recipe (~3M total): close to 50% / 25% / 15% / 10% human / direct / hard / mixed for mdok-style
# binary training (PAN-style human vs machine). JSONL uses label_int 0=human, 1=machine; mixed rows use
# label "ai", label_int 1, sample_kind "mixed" for stratified eval / calibration (not a third class).
sample_targets:
  human: 1500000
  direct_ai: 700000
  hard_ai: 500000
  mixed: 300000
# Strict 50/25/15/10 on 3M rows would be: 1_500_000 / 750_000 / 450_000 / 300_000 — adjust if you want exact ratios.

# Safety valve when use_sample_quotas is true (null = unlimited Pile scans)
max_documents_scan: null

# How often to flush sample_counts.json during quota builds
sample_counts_sync_every: 100

# Block near-duplicate base_text using lowercase + whitespace-normalized hash (append resumes scan JSONLs)
dedup_normalize_text: true

# Train / val / test / stress ratios (stress is assigned when using stress model list)
split_ratios:
  train: 0.80
  val: 0.10
  test: 0.10
